<app-navbar></app-navbar>

<div class="container mt-4">
  <h4 class="fw-bold mb-4">Panel de Administración</h4>

  @if (cargando) {
    <div class="text-center py-5">
      <div class="spinner-border text-dark"></div>
    </div>
  }

  @if (!cargando) {
    <div class="row g-4 mb-5">
      <div class="col-md-3">
        <div class="card text-center shadow-sm border-0">
          <div class="card-body py-4">
            <h2 class="fw-bold text-dark">{{ totalEventos }}</h2>
            <p class="text-muted mb-0">Total Clases</p>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card text-center shadow-sm border-0">
          <div class="card-body py-4">
            <h2 class="fw-bold text-success">{{ totalActivos }}</h2>
            <p class="text-muted mb-0">Clases Activas</p>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card text-center shadow-sm border-0">
          <div class="card-body py-4">
            <h2 class="fw-bold text-primary">{{ totalReservas }}</h2>
            <p class="text-muted mb-0">Reservas</p>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card text-center shadow-sm border-0">
          <div class="card-body py-4">
            <h2 class="fw-bold text-secondary">{{ totalUsuarios }}</h2>
            <p class="text-muted mb-0">Usuarios</p>
          </div>
        </div>
      </div>
    </div>

    <div class="d-flex gap-3">
      <a routerLink="/admin/eventos" class="btn btn-dark">Gestionar Clases</a>
      <a routerLink="/admin/usuarios" class="btn btn-outline-dark">Gestionar Usuarios</a>
    </div>
  }
</div>
