<app-navbar></app-navbar>

<div class="container mt-5" style="max-width: 420px;">
  <div class="card shadow-sm">
    <div class="card-header bg-dark text-white text-center">
      <h4 class="mb-0">Iniciar Sesión</h4>
    </div>
    <div class="card-body p-4">

      @if (mensajeError) {
        <div class="alert alert-danger" role="alert">{{ mensajeError }}</div>
      }

      <form [formGroup]="form" (ngSubmit)="login()" novalidate>

        <div class="mb-3">
          <label for="username" class="form-label fw-semibold">Usuario</label>
          <input
            id="username"
            type="text"
            class="form-control"
            [class.is-invalid]="username.invalid && username.touched"
            formControlName="username"
            aria-label="Nombre de usuario"
            autocomplete="username" />
          @if (username.invalid && username.touched) {
            <div class="invalid-feedback">El usuario es obligatorio.</div>
          }
        </div>

        <div class="mb-4">
          <label for="password" class="form-label fw-semibold">Contraseña</label>
          <input
            id="password"
            type="password"
            class="form-control"
            [class.is-invalid]="password.invalid && password.touched"
            formControlName="password"
            aria-label="Contraseña"
            autocomplete="current-password" />
          @if (password.invalid && password.touched) {
            <div class="invalid-feedback">La contraseña es obligatoria.</div>
          }
        </div>

        <button
          type="submit"
          class="btn btn-dark w-100"
          [disabled]="cargando"
          aria-label="Iniciar sesión">
          @if (cargando) {
            <span class="spinner-border spinner-border-sm me-2"></span>
          }
          Entrar
        </button>

      </form>

      <hr>
      <p class="text-center text-muted small mb-0">
        ¿No tienes cuenta?
        <a routerLink="/registro" class="text-dark fw-semibold">Regístrate</a>
      </p>

    </div>
  </div>
</div>
