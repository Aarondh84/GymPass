<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow p-4" style="width: 100%; max-width: 420px;">

    <div class="text-center mb-4">
      <h2 class="fw-bold">🏋️ GymPass</h2>
      <p class="text-muted">Inicia sesión en tu cuenta</p>
    </div>

    @if (errorMsg) {
      <div class="alert alert-danger">{{ errorMsg }}</div>
    }

    <div class="mb-3">
      <label class="form-label fw-semibold">Usuario</label>
      <input type="text" class="form-control" placeholder="Tu username"
             [(ngModel)]="credentials.username" />
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold">Contraseña</label>
      <input type="password" class="form-control" placeholder="Tu contraseña"
             [(ngModel)]="credentials.password" />
    </div>

    <button class="btn btn-dark w-100 mt-2" (click)="login()" [disabled]="cargando">
      @if (cargando) {
        <span class="spinner-border spinner-border-sm me-2"></span>
      }
      Entrar
    </button>

    <hr>
    <p class="text-center text-muted small">
      ¿No tienes cuenta?
      <a routerLink="/registro" class="text-dark fw-semibold">Regístrate aquí</a>
    </p>

  </div>
</div>
